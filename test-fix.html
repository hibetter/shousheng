<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>八字排盘修复验证</title>
  <style>
    body { font-family: 'Microsoft YaHei', sans-serif; padding: 20px; }
    .test { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .expected { color: green; font-weight: bold; }
    .actual { color: blue; }
    .wrong { color: red; }
    .correct { color: green; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #4a90d9; color: white; }
  </style>
</head>
<body>
  <h1>八字排盘修复验证</h1>
  <div id="result"></div>
  <script src="js/lunar-lib.js"></script>
  <script src="js/lunar.js"></script>
  <script>
    var result = document.getElementById('result');

    // 测试用例：1984年3月8日23:14
    var testCases = [
      {
        solar: { year: 1984, month: 3, day: 8 },
        hour: 23,
        expected: {
          lunar: '二月初七',
          bazi: '甲子 丁卯 壬寅 庚子'
        }
      }
    ];

    testCases.forEach(function(tc, idx) {
      result.innerHTML += '<div class="test"><h2>测试' + (idx + 1) + ': ' + tc.solar.year + '年' + tc.solar.month + '月' + tc.solar.day + '日 ' + tc.hour + ':00</h2>';

      // 1. 公历转农历
      var lunarInfo = Lunar.solarToLunar(tc.solar.year, tc.solar.month, tc.solar.day);
      result.innerHTML += '<h3>1. 公历转农历</h3>';
      result.innerHTML += '<p>公历: ' + tc.solar.year + '-' + tc.solar.month + '-' + tc.solar.day + '</p>';
      result.innerHTML += '<p>库返回农历: ' + lunarInfo.lunarYear + '年' + lunarInfo.lunarMonth + '月' + lunarInfo.lunarDay + '日</p>';
      result.innerHTML += '<p>月份名: ' + lunarInfo.monthName + '</p>';
      result.innerHTML += '<p>日期名: ' + lunarInfo.dayName + '</p>';

      // 2. 获取八字
      var baZi = Lunar.getBaZi(lunarInfo.lunarYear, lunarInfo.lunarMonth, lunarInfo.lunarDay, lunarInfo.isLeap, tc.hour);
      result.innerHTML += '<h3>2. 八字计算（小时=' + tc.hour + '）</h3>';
      result.innerHTML += '<p>年柱: ' + baZi.yearGanZhi + '</p>';
      result.innerHTML += '<p>月柱: ' + baZi.monthGanZhi + '</p>';
      result.innerHTML += '<p>日柱: ' + baZi.dayGanZhi + '</p>';
      result.innerHTML += '<p>时柱: ' + baZi.timeGanZhi + '</p>';
      result.innerHTML += '<p><strong>完整八字: ' + baZi.yearGanZhi + ' ' + baZi.monthGanZhi + ' ' + baZi.dayGanZhi + ' ' + baZi.timeGanZhi + '</strong></p>';

      // 3. 期望结果
      result.innerHTML += '<h3>3. 期望结果</h3>';
      result.innerHTML += '<p class="expected">农历: 一九八四年 ' + tc.expected.lunar + '</p>';
      result.innerHTML += '<p class="expected">八字: ' + tc.expected.bazi + '</p>';

      // 4. 对比
      result.innerHTML += '<h3>4. 验证结果</h3>';
      var actualBazi = baZi.yearGanZhi + ' ' + baZi.monthGanZhi + ' ' + baZi.dayGanZhi + ' ' + baZi.timeGanZhi;
      var isCorrect = actualBazi === tc.expected.bazi;
      result.innerHTML += '<p>实际: ' + actualBazi + '</p>';
      result.innerHTML += '<p class="' + (isCorrect ? 'correct' : 'wrong') + '">' + (isCorrect ? '✅ 正确!' : '❌ 错误') + '</p>';

      result.innerHTML += '</div>';
    });

    // 测试五鼠遁口诀
    result.innerHTML += '<h2>五鼠遁口诀验证</h2>';
    result.innerHTML += '<table><tr><th>日干</th><th>子时天干</th><th>口诀</th></tr>';
    var tests = [
      { gan: '甲', zi: '甲', note: '甲己日起甲子' },
      { gan: '己', zi: '甲', note: '甲己日起甲子' },
      { gan: '乙', zi: '丙', note: '乙庚日起丙子' },
      { gan: '庚', zi: '丙', note: '乙庚日起丙子' },
      { gan: '丙', zi: '戊', note: '丙辛日起戊子' },
      { gan: '辛', zi: '戊', note: '丙辛日起戊子' },
      { gan: '丁', zi: '庚', note: '丁壬日起庚子' },
      { gan: '壬', zi: '庚', note: '丁壬日起庚子' },
      { gan: '戊', zi: '壬', note: '戊癸日起壬子' },
      { gan: '癸', zi: '壬', note: '戊癸日起壬子' },
    ];
    tests.forEach(function(t) {
      // 日柱为X，子时
      var dGIdx = Lunar.TianGan.indexOf(t.gan);
      var ziGanIdx = (dGIdx * 2) % 10;
      var actualZi = Lunar.TianGan[ziGanIdx];
      var isCorrect = actualZi === t.zi;
      result.innerHTML += '<tr><td>' + t.gan + '</td><td>' + actualZi + '</td><td>' + t.note + ' ' + (isCorrect ? '✅' : '❌') + '</td></tr>';
    });
    result.innerHTML += '</table>';
  </script>
</body>
</html>
