<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - 寿生宝鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>☯ 寿生宝鉴</h1>
      <p>注册账号，保存每次计算记录</p>
    </div>

    <div id="alertBox"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>用户名 <span style="color:var(--primary)">*</span></label>
        <input type="text" id="username" placeholder="至少2个字符" required>
      </div>
      <div class="form-group">
        <label>密码 <span style="color:var(--primary)">*</span></label>
        <input type="password" id="password" placeholder="至少6位" required>
      </div>
      <div class="form-group">
        <label>确认密码 <span style="color:var(--primary)">*</span></label>
        <input type="password" id="password2" placeholder="再次输入密码" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>手机号 <small style="color:var(--text-muted)">(选填)</small></label>
          <input type="tel" id="phone" placeholder="选填">
        </div>
        <div class="form-group">
          <label>邮箱 <small style="color:var(--text-muted)">(选填)</small></label>
          <input type="email" id="email" placeholder="选填">
        </div>
      </div>
      <div style="margin-top:8px">
        <button type="submit" class="btn btn-primary btn-block">注 册</button>
      </div>
    </form>

    <div style="text-align:center; margin-top:16px; font-size:0.9rem; color:var(--text-muted)">
      已有账号？<a href="login.html" style="color:var(--primary)">立即登录</a>
    </div>
    <div style="text-align:center; margin-top:8px; font-size:0.85rem;">
      <a href="index.html" style="color:var(--text-muted)">← 返回首页</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
if(Auth.getCurrentUsername()) window.location.href = 'calculate.html';

document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var password2 = document.getElementById('password2').value;
  var phone = document.getElementById('phone').value.trim();
  var email = document.getElementById('email').value.trim();

  if(password !== password2){
    document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">两次输入的密码不一致</div>';
    return;
  }

  Auth.register(username, password, phone, email).then(function(data){
    if(data.ok){
      document.getElementById('alertBox').innerHTML = '<div class="alert alert-success">注册成功！正在跳转...</div>';
      Auth.login(username, password).then(function(){
        setTimeout(function(){ window.location.href = 'calculate.html'; }, 1000);
      });
    } else {
      document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">' + (data.msg || '注册失败') + '</div>';
    }
  }).catch(function(err){
    document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">网络错误，请稍后重试</div>';
    console.error(err);
  });
});
</script>

<!-- 版权信息 -->
<div style="text-align:center;padding:24px 0 36px;color:var(--text-muted);font-size:0.78rem;line-height:2">
  <p style="color:#888">寿生宝鉴 · 免费分享 · 信诚则灵</p>
  <p style="margin-top:2px;color:var(--primary)">心念为善，愿见者得安</p>
</div>

</body>
</html>
