<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>八字排盘 - 早子时/晚子时验证</title>
  <style>
    body { font-family: 'Microsoft YaHei', sans-serif; padding: 20px; }
    .test { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .expected { color: green; font-weight: bold; }
    .actual { color: blue; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #4a90d9; color: white; }
  </style>
</head>
<body>
  <h1>八字排盘 - 早子时/晚子时验证</h1>
  <div id="result"></div>
  <script src="js/lunar-lib.js"></script>
  <script src="js/lunar.js"></script>
  <script>
    var result = document.getElementById('result');

    function runTest(solarYear, solarMonth, solarDay, hour, minute, expectedLunar, expectedBazi) {
      var div = document.createElement('div');
      div.className = 'test';

      div.innerHTML = '<h2>公历 ' + solarYear + '-' + solarMonth + '-' + solarDay + ' ' + hour + ':' + (minute || '00') + '</h2>';

      // 1. 公历转农历
      var lunarInfo = Lunar.solarToLunar(solarYear, solarMonth, solarDay);
      div.innerHTML += '<p><strong>库计算农历:</strong> ' + lunarInfo.lunarYear + '年' + lunarInfo.lunarMonth + '月' + lunarInfo.lunarDay + '日</p>';

      // 2. 获取八字
      var baZi = Lunar.getBaZi(lunarInfo.lunarYear, lunarInfo.lunarMonth, lunarInfo.lunarDay, lunarInfo.isLeap, hour);
      var actualBazi = baZi.yearGanZhi + ' ' + baZi.monthGanZhi + ' ' + baZi.dayGanZhi + ' ' + baZi.timeGanZhi;

      div.innerHTML += '<p><strong>实际八字:</strong> ' + actualBazi + '</p>';
      div.innerHTML += '<p class="expected"><strong>期望八字:</strong> ' + expectedBazi + '</p>';

      // 五鼠遁分析
      div.innerHTML += '<details><summary>五鼠遁分析</summary>';
      div.innerHTML += '<p>日柱: ' + baZi.dayGanZhi + '</p>';
      div.innerHTML += '<p>时支: ' + baZi.timeZhi + '</p>';
      div.innerHTML += '<p>时柱: ' + baZi.timeGanZhi + '</p>';

      // 日干到子时的距离
      var ganOrder = Lunar.TianGan;
      var zhiOrder = Lunar.DiZhi;
      var dayGanIdx = ganOrder.indexOf(baZi.dayGan[0]);
      var timeZhiIdx = zhiOrder.indexOf(baZi.timeZhi[0]);
      var ziGanIdx = (dayGanIdx * 2) % 10;

      div.innerHTML += '<p>日干指数: ' + dayGanIdx + ' (' + baZi.dayGan[0] + ')</p>';
      div.innerHTML += '<p>子时天干指数: ' + ziGanIdx + ' (' + ganOrder[ziGanIdx] + ')</p>';
      div.innerHTML += '<p>时支指数: ' + timeZhiIdx + ' (' + baZi.timeZhi[0] + ')</p>';
      div.innerHTML += '<p>时干: (' + ganOrder[ziGanIdx] + ' + ' + timeZhiIdx + ') % 10 = ' + ganOrder[(ziGanIdx + timeZhiIdx) % 10] + '</p>';
      div.innerHTML += '</details>';

      document.getElementById('result').appendChild(div);
    }

    // 测试用例
    result.innerHTML = '<h2>测试1: 早子时（00:14）</h2>';
    runTest(1984, 3, 8, 0, 14, '二月初六', '甲子 丁卯 辛丑 戊子');

    result.innerHTML += '<h2>测试2: 晚子时（23:14）</h2>';
    runTest(1984, 3, 8, 23, 14, '二月初七', '甲子 丁卯 壬寅 庚子');

    // 五鼠遁口诀表
    result.innerHTML += '<h2>五鼠遁口诀验证表</h2>';
    result.innerHTML += '<table><tr><th>日干</th><th>子时</th><th>口诀</th></tr>';
    var tests = [
      { gan: '甲', zi: '甲', note: '甲己日起甲子' },
      { gan: '己', zi: '甲', note: '甲己日起甲子' },
      { gan: '乙', zi: '丙', note: '乙庚日起丙子' },
      { gan: '庚', zi: '丙', note: '乙庚日起丙子' },
      { gan: '丙', zi: '戊', note: '丙辛日起戊子' },
      { gan: '辛', zi: '戊', note: '丙辛日起戊子' },
      { gan: '丁', zi: '庚', note: '丁壬日起庚子' },
      { gan: '壬', zi: '庚', note: '丁壬日起庚子' },
      { gan: '戊', zi: '壬', note: '戊癸日起壬子' },
      { gan: '癸', zi: '壬', note: '戊癸日起壬子' },
    ];
    tests.forEach(function(t) {
      var dGIdx = Lunar.TianGan.indexOf(t.gan);
      var ziGanIdx = (dGIdx * 2) % 10;
      var actualZi = Lunar.TianGan[ziGanIdx];
      var isCorrect = actualZi === t.zi;
      result.innerHTML += '<tr><td>' + t.gan + '</td><td>' + actualZi + '</td><td>' + t.note + ' ' + (isCorrect ? '✅' : '❌') + '</td></tr>';
    });
    result.innerHTML += '</table>';

    // 辛丑日的完整时辰表
    result.innerHTML += '<h2>辛丑日（用户案例）时辰表</h2>';
    result.innerHTML += '<table><tr><th>时辰</th><th>时间</th><th>天干</th><th>地支</th><th>时柱</th></tr>';
    var ziGan = Lunar.TianGan[(Lunar.TianGan.indexOf('辛') * 2) % 10]; // 戊
    var zhiNames = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    zhiNames.forEach(function(z, i) {
      var h = (i === 0) ? 23 : (i * 2 - 1);
      var h2 = (i === 0) ? 0 : (i * 2 + 1);
      var tG = Lunar.TianGan[(Lunar.TianGan.indexOf('辛') * 2 + i) % 10];
      result.innerHTML += '<tr><td>' + z + '时</td><td>' + h + '-' + h2 + '</td><td>' + tG + '</td><td>' + z + '</td><td>' + tG + z + '</td></tr>';
    });
    result.innerHTML += '</table>';
  </script>
</body>
</html>
