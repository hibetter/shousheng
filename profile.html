<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - 寿生宝鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <a class="topbar-logo" href="index.html">
    <span class="logo-icon">☯</span>
    <span>寿生宝鉴</span>
  </a>
  <div class="topbar-nav" id="navLinks"></div>
</nav>

<div class="container">

  <div class="card">
    <div class="card-title">👤 个人信息</div>
    <div class="profile-info" id="profileInfo">
      <div style="color:var(--text-muted);font-size:0.9rem">加载中…</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔐 修改密码</div>
    <div id="pwdAlert"></div>
    <form id="pwdForm">
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="oldPwd" placeholder="输入当前密码" required>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPwd" placeholder="至少6位" required>
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="newPwd2" placeholder="再次输入新密码" required>
      </div>
      <button type="submit" class="btn btn-primary">修改密码</button>
    </form>
  </div>

  <div class="card" style="border-color:#f5c6c6">
    <div class="card-title" style="color:#c0392b">⚠️ 危险操作</div>
    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:16px">清除所有历史记录或注销账号（不可恢复）。</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-danger" id="clearBtn" onclick="clearAllRecords()">🗑️ 清除所有记录</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteAccount()">❌ 注销账号</button>
    </div>
  </div>

</div>

<script src="js/auth.js"></script>
<script>
(function(){
  if(!Auth.requireLogin()) throw '';
  var user = Auth.getCurrentUsername();

  document.getElementById('navLinks').innerHTML =
    '<span class="topbar-user">👤 ' + user + '</span>' +
    '<a href="calculate.html">计算</a>' +
    '<a href="history.html">历史</a>' +
    '<a href="profile.html" style="color:var(--gold-light)">个人中心</a>' +
    '<button onclick="Auth.logout();location.href=\'index.html\'">退出</button>';

  // 加载个人信息
  Auth.getProfile(user).then(function(data){
    var info = document.getElementById('profileInfo');
    if(data && data.ok && data.user){
      var u = data.user;
      info.innerHTML =
        '<div class="profile-row"><label>用户名</label><span><strong>' + u.username + '</strong></span></div>' +
        '<div class="profile-row"><label>手机号</label><span>' + (u.phone || '未填写') + '</span></div>' +
        '<div class="profile-row"><label>邮箱</label><span>' + (u.email || '未填写') + '</span></div>' +
        '<div class="profile-row"><label>注册时间</label><span>' + (u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '—') + '</span></div>' +
        '<div class="profile-row"><label>计算记录</label><span>' + (u.record_count || 0) + ' 条</span></div>';
    } else {
      info.innerHTML = '<div class="alert alert-error">加载失败</div>';
    }
  });

  // 修改密码
  document.getElementById('pwdForm').addEventListener('submit', function(e){
    e.preventDefault();
    var oldPwd = document.getElementById('oldPwd').value;
    var newPwd = document.getElementById('newPwd').value;
    var newPwd2 = document.getElementById('newPwd2').value;
    var alertBox = document.getElementById('pwdAlert');

    if(newPwd !== newPwd2){
      alertBox.innerHTML = '<div class="alert alert-error">两次新密码不一致</div>';
      return;
    }
    if(newPwd.length < 6){
      alertBox.innerHTML = '<div class="alert alert-error">新密码至少6位</div>';
      return;
    }

    alertBox.innerHTML = '<div style="color:var(--text-muted);font-size:0.85rem">提交中…</div>';
    Auth.updatePassword(user, oldPwd, newPwd).then(function(data){
      if(data && data.ok){
        alertBox.innerHTML = '<div class="alert alert-success">密码修改成功！</div>';
        document.getElementById('pwdForm').reset();
      } else {
        alertBox.innerHTML = '<div class="alert alert-error">' + (data ? data.msg : '修改失败') + '</div>';
      }
    }).catch(function(){
      alertBox.innerHTML = '<div class="alert alert-error">网络错误</div>';
    });
  });

  // 清除所有记录
  window.clearAllRecords = function(){
    if(!confirm('确定要清除所有计算记录吗？此操作不可恢复！')) return;
    document.getElementById('clearBtn').disabled = true;
    document.getElementById('clearBtn').textContent = '清除中…';
    Auth.getRecords(user).then(function(data){
      if(!data || !data.ok) return;
      var records = data.records || [];
      var promises = records.map(function(r){
        return Auth.deleteRecord(user, r.id);
      });
      Promise.all(promises).then(function(){
        alert('已清除所有记录');
        location.reload();
      });
    });
  };

  // 注销账号
  window.deleteAccount = function(){
    if(!confirm('确定要注销账号吗？所有数据将被永久删除！')) return;
    if(!confirm('请再次确认：账号注销后无法恢复！')) return;
    document.getElementById('deleteBtn').disabled = true;
    document.getElementById('deleteBtn').textContent = '注销中…';
    Auth.deleteAccount(user).then(function(data){
      if(data && data.ok){
        alert('账号已注销');
        location.href = 'index.html';
      } else {
        document.getElementById('deleteBtn').disabled = false;
        document.getElementById('deleteBtn').textContent = '❌ 注销账号';
        alert((data ? data.msg : '注销失败'));
      }
    }).catch(function(){
      document.getElementById('deleteBtn').disabled = false;
      document.getElementById('deleteBtn').textContent = '❌ 注销账号';
      alert('网络错误');
    });
  };
})();
</script>

</body>
</html>
