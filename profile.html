<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - 寿生宝鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <a class="topbar-logo" href="index.html">
    <span class="logo-icon">☯</span>
    <span>寿生宝鉴</span>
  </a>
  <div class="topbar-nav" id="navLinks"></div>
</nav>

<div class="container">

  <div class="card">
    <div class="card-title">👤 个人信息</div>
    <div class="profile-info" id="profileInfo"></div>
  </div>

  <div class="card">
    <div class="card-title">📋 计算说明</div>
    <div class="alert alert-info">
      ⚠️ 本系统基于传统阴债换算法，所有数据来源于专业数据表，仅供参考。
    </div>
    <table class="result-table" style="margin-top:12px">
      <thead>
        <tr>
          <th>计算项目</th>
          <th>说明</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><strong>年柱欠额</strong></td>
          <td>根据出生农历年对应的60甲子干支查询欠额</td>
        </tr>
        <tr>
          <td><strong>月柱欠额</strong></td>
          <td>月干欠额 + 月份（农历月份）欠额之和</td>
        </tr>
        <tr>
          <td><strong>日柱欠额</strong></td>
          <td>根据农历出生日（初一～三十）查询欠额</td>
        </tr>
        <tr>
          <td><strong>时柱欠额</strong></td>
          <td>时干欠额 + 时支（子丑寅卯...）欠额之和</td>
        </tr>
        <tr>
          <td><strong>官债总额</strong></td>
          <td>以上各项之和</td>
        </tr>
        <tr>
          <td><strong>私债 + 利息</strong></td>
          <td>私债 = 官债；利息 = 私债 × 年龄倍数（0-9岁×2，每10年+1）</td>
        </tr>
        <tr>
          <td><strong>总计该还</strong></td>
          <td>官债 + 私债 + 利息</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">🔐 修改密码</div>
    <div id="pwdAlert"></div>
    <form id="pwdForm">
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="oldPwd" placeholder="输入当前密码" required>
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPwd" placeholder="至少6位" required>
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="newPwd2" placeholder="再次输入新密码" required>
      </div>
      <button type="submit" class="btn btn-primary">修改密码</button>
    </form>
  </div>

  <div class="card" style="border-color:#f5c6c6">
    <div class="card-title" style="color:#c0392b">⚠️ 危险操作</div>
    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:16px">清除所有历史记录或注销账号（不可恢复）。</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-danger" onclick="clearAllRecords()">🗑️ 清除所有记录</button>
      <button class="btn btn-danger" onclick="deleteAccount()">❌ 注销账号</button>
    </div>
  </div>

</div>

<script src="js/auth.js"></script>
<script>
if(!Auth.requireLogin()) throw '';

const user = Auth.getCurrentUsername();
document.getElementById('navLinks').innerHTML = `
  <span class="topbar-user">👤 ${user}</span>
  <a href="calculate.html">计算</a>
  <a href="history.html">历史</a>
  <a href="profile.html" style="color:var(--gold-light)">个人中心</a>
  <button onclick="Auth.logout();location.href='index.html'">退出</button>
`;

// 显示个人信息
(function(){
  const users = JSON.parse(localStorage.getItem('yinzhai_users') || '{}');
  const u = users[user] || {};
  const records = Auth.getRecords(user);
  const info = document.getElementById('profileInfo');
  info.innerHTML = `
    <div class="profile-row">
      <label>用户名</label>
      <span><strong>${user}</strong></span>
    </div>
    <div class="profile-row">
      <label>手机号</label>
      <span>${u.phone || '未填写'}</span>
    </div>
    <div class="profile-row">
      <label>邮箱</label>
      <span>${u.email || '未填写'}</span>
    </div>
    <div class="profile-row">
      <label>注册时间</label>
      <span>${u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '—'}</span>
    </div>
    <div class="profile-row">
      <label>计算记录</label>
      <span>${records.length} 条</span>
    </div>
  `;
})();

// 修改密码
document.getElementById('pwdForm').addEventListener('submit', function(e){
  e.preventDefault();
  const oldPwd = document.getElementById('oldPwd').value;
  const newPwd = document.getElementById('newPwd').value;
  const newPwd2 = document.getElementById('newPwd2').value;

  if(newPwd !== newPwd2){
    document.getElementById('pwdAlert').innerHTML = '<div class="alert alert-error">两次新密码不一致</div>';
    return;
  }
  if(newPwd.length < 6){
    document.getElementById('pwdAlert').innerHTML = '<div class="alert alert-error">新密码至少6位</div>';
    return;
  }

  const users = JSON.parse(localStorage.getItem('yinzhai_users') || '{}');
  const u = users[user];
  if(!u || atob(u.password) !== oldPwd){
    document.getElementById('pwdAlert').innerHTML = '<div class="alert alert-error">当前密码错误</div>';
    return;
  }

  users[user].password = btoa(newPwd);
  localStorage.setItem('yinzhai_users', JSON.stringify(users));
  document.getElementById('pwdAlert').innerHTML = '<div class="alert alert-success">密码修改成功！</div>';
  document.getElementById('pwdForm').reset();
});

function clearAllRecords(){
  if(!confirm('确定要清除所有计算记录吗？此操作不可恢复！')) return;
  const all = JSON.parse(localStorage.getItem('yinzhai_records') || '{}');
  all[user] = [];
  localStorage.setItem('yinzhai_records', JSON.stringify(all));
  alert('已清除所有记录');
  location.reload();
}

function deleteAccount(){
  if(!confirm('确定要注销账号吗？所有数据将被永久删除！')) return;
  if(!confirm('请再次确认：账号注销后无法恢复！')) return;

  // 删除记录
  const allRec = JSON.parse(localStorage.getItem('yinzhai_records') || '{}');
  delete allRec[user];
  localStorage.setItem('yinzhai_records', JSON.stringify(allRec));

  // 删除用户
  const users = JSON.parse(localStorage.getItem('yinzhai_users') || '{}');
  delete users[user];
  localStorage.setItem('yinzhai_users', JSON.stringify(users));

  Auth.logout();
  alert('账号已注销');
  location.href = 'index.html';
}
</script>

</body>
</html>
