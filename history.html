<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史记录 - 寿生宝鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <a class="topbar-logo" href="index.html">
    <span class="logo-icon">☯</span>
    <span>寿生宝鉴</span>
  </a>
  <div class="topbar-nav" id="navLinks"></div>
</nav>

<div class="container">
  <div class="card">
    <div class="card-title">📜 历史计算记录</div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 按姓名搜索..." oninput="renderTable()">
      <a href="calculate.html" class="btn btn-primary btn-sm">+ 新计算</a>
    </div>

    <div id="tableWrapper">
      <table class="history-table" id="historyTable">
        <thead>
          <tr>
            <th>姓名</th>
            <th>八字</th>
            <th>总计该还</th>
            <th>计算时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon">📋</div>
        <p>暂无计算记录</p>
        <a href="calculate.html" class="btn btn-primary btn-sm" style="margin-top:12px">开始计算</a>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <div id="recordCount" style="text-align:center;margin-top:8px;font-size:0.8rem;color:var(--text-muted)"></div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
// 登录检查
if(!Auth.requireLogin()) throw '';

var user = Auth.getCurrentUsername();
document.getElementById('navLinks').innerHTML =
  '<span class="topbar-user">👤 ' + user + '</span>' +
  '<a href="calculate.html">计算</a>' +
  '<a href="history.html" style="color:var(--gold-light)">历史</a>' +
  '<a href="about.html">关于</a>' +
  '<a href="profile.html">个人中心</a>' +
  '<button onclick="Auth.logout();location.href=\'index.html\'">退出</button>';

var PAGE_SIZE = 10;
var currentPage = 1;
var records = [];
var allLoaded = false;

function loadRecords(){
  document.getElementById('historyBody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:24px">加载中…</td></tr>';
  Auth.getRecords(user).then(function(data){
    allLoaded = true;
    records = (data && data.ok && data.records) ? data.records : [];
    renderTable();
  }).catch(function(){
    allLoaded = true;
    records = [];
    renderTable();
  });
}

function filteredRecords(){
  var q = document.getElementById('searchInput').value.trim();
  if(!q) return records;
  return records.filter(function(r){ return r.name && r.name.indexOf(q) > -1; });
}

function renderTable(){
  var data = filteredRecords();
  var total = data.length;
  var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  if(currentPage > totalPages) currentPage = 1;

  var start = (currentPage - 1) * PAGE_SIZE;
  var pageData = data.slice(start, start + PAGE_SIZE);

  var tbody = document.getElementById('historyBody');
  var empty = document.getElementById('emptyState');
  var table = document.getElementById('historyTable');

  if(!allLoaded) return;

  if(pageData.length === 0){
    table.style.display = '';
    empty.style.display = total === 0 ? '' : 'none';
  } else {
    table.style.display = '';
    empty.style.display = 'none';
  }

  tbody.innerHTML = '';
  pageData.forEach(function(r){
    var date = new Date(r.created_at);
    var dateStr = date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><strong>' + (r.name || '佚名') + '</strong></td>' +
      '<td class="bazi-cell">' + (r.bazi || '—') + '</td>' +
      '<td class="amount-cell">¥ ' + (r.total_debt||0).toLocaleString() + '</td>' +
      '<td style="font-size:0.8rem;color:var(--text-muted)">' + dateStr + '</td>' +
      '<td>' +
        '<a href="detail.html?id=' + r.id + '" class="btn btn-secondary btn-sm" style="margin-right:4px">详情</a>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteRecord(\'' + r.id + '\')">删除</button>' +
      '</td>';
    tbody.appendChild(tr);
  });

  renderPagination(totalPages);
  document.getElementById('recordCount').textContent = '共 ' + total + ' 条记录';
}

function renderPagination(totalPages){
  var el = document.getElementById('pagination');
  el.innerHTML = '';
  if(totalPages <= 1) return;
  for(var i = 1; i <= totalPages; i++){
    var btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i;
    btn.onclick = (function(i){ return function(){ currentPage = i; renderTable(); }; })(i);
    el.appendChild(btn);
  }
}

function deleteRecord(id){
  if(!confirm('确定要删除这条记录吗？')) return;
  Auth.deleteRecord(user, id).then(function(){
    records = records.filter(function(r){ return r.id !== id; });
    renderTable();
  });
}

loadRecords();
</script>

<!-- 版权信息 -->
<div class="container" style="text-align:center;padding:32px 0 48px;color:var(--text-muted);font-size:0.78rem;line-height:2">
  <p style="color:#888">寿生宝鉴 · 免费分享 · 信诚则灵</p>
  <p style="margin-top:2px;color:var(--primary)">心念为善，愿见者得安</p>
</div>

</body>
</html>
