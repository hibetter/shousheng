<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 寿生宝鉴</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>☯ 寿生宝鉴</h1>
      <p>登录后可保存每次计算记录</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <div style="margin-top:8px">
        <button type="submit" class="btn btn-primary btn-block">登 录</button>
      </div>
    </form>

    <div style="text-align:center; margin-top:16px; font-size:0.9rem; color:var(--text-muted)">
      还没有账号？<a href="register.html" style="color:var(--primary)">立即注册</a>
    </div>
    <div style="text-align:center; margin-top:8px; font-size:0.85rem;">
      <a href="index.html" style="color:var(--text-muted)">← 返回首页</a>
    </div>

    <!-- 演示账号 -->
    <div class="alert alert-info" style="margin-top:20px;font-size:0.8rem">
      💡 可先<a href="register.html" style="color:var(--primary)">注册账号</a>体验，或直接<a href="calculate.html" style="color:var(--primary)">游客计算</a>（不保存记录）
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
// 已登录则跳转
if(Auth.getCurrentUsername()) window.location.href = 'calculate.html';

document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  Auth.login(username, password).then(function(data){
    if(data.ok){
      window.location.href = 'calculate.html';
    } else {
      document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">' + (data.msg || '登录失败') + '</div>';
    }
  }).catch(function(err){
    document.getElementById('alertBox').innerHTML = '<div class="alert alert-error">网络错误，请稍后重试</div>';
    console.error(err);
  });
});
</script>

</body>
</html>
